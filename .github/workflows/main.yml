name: Build Android APK
on:
  workflow_dispatch: # Allows you to run it manually from the "Actions" tab
  push:
    branches:
      - main # Make sure this matches your main branch name

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: 🏗 Checkout Repository
        uses: actions/checkout@v4

      - name: 🟢 Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 18
          cache: 'npm'

      - name: 🛠 Setup Expo & EAS
        uses: expo/expo-github-action@v8
        with:
          expo-version: latest
          eas-version: latest # Forces GitHub to use the newest EAS CLI
          token: ${{ secrets.EXPO_TOKEN }}

      - name: 📦 Install Dependencies
        run: |
          npm install
          npm install -g eas-cli@latest --force

      - name: 🚀 Build APK Locally on GitHub
        # The --local flag uses GitHub's CPU instead of the EAS cloud queue
        # The --non-interactive flag prevents it from asking questions
        run: eas build -p android --profile preview --local --non-interactive

name: Build Android APK
on:
  workflow_dispatch:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: 🏗 Checkout Repository
        uses: actions/checkout@v4

      - name: 🟢 Setup Node (v20)
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: 🛠 Setup Expo & EAS
        uses: expo/expo-github-action@v8
        with:
          expo-version: latest
          eas-version: latest
          token: ${{ secrets.EXPO_TOKEN }}

      - name: 📦 Install Dependencies
        run: |
          npm install
          npm install -g eas-cli@latest --force

      - name: 🚀 Build APK Locally on GitHub
        run: eas build -p android --profile preview --local --non-interactive
        env:
          EXPO_NO_DOCTOR: 1 # Bypasses minor config warnings to ensure it finishes

      - name: 📦 Upload APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: flavortown-apk
          path: build-*.apk # Grabs the generated APK file from the runner disk
          if-no-files-found: error

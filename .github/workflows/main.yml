name: Build Android APK
on:
  workflow_dispatch:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: 🏗 Checkout Repository
        uses: actions/checkout@v4

      - name: 🟢 Setup Node (Upgraded to v20)
        uses: actions/setup-node@v4
        with:
          node-version: 20 # <--- This fixes the "Incompatible Module" error
          cache: 'npm'

      - name: 🛠 Setup Expo & EAS
        uses: expo/expo-github-action@v8
        with:
          expo-version: latest
          eas-version: latest
          token: ${{ secrets.EXPO_TOKEN }}

      - name: 📦 Install Dependencies
        run: |
          npm install
          npm install -g eas-cli@latest --force

      - name: 🚀 Build APK Locally on GitHub
        run: eas build -p android --profile preview --local --non-interactive
      - name: 📦 Upload APK Artifact
        uses: actions/checkout@v4 # Re-confirming path
      - uses: actions/upload-artifact@v4
        with:
          name: flavortown-apk
          path: build-*.apk # This matches the filename from your logs
